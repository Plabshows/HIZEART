backend:
  name: github
  repo: Plabshows/HIZEART
  branch: main
  use_graphql: true
  commit_messages:
    create: "cms: create {{collection}} {{slug}}"
    update: "cms: update {{collection}} {{slug}}"
    delete: "cms: delete {{collection}} {{slug}}"
    uploadMedia: "cms: upload {{path}}"
    deleteMedia: "cms: delete {{path}}"

local_backend: true
site_url: https://hizeart.vercel.app
display_url: https://hizeart.vercel.app
media_folder: "public/assets/images/uploads"
public_folder: "/assets/images/uploads"

collections:
  - name: "art_content"
    label: "HIZE ART Content"
    files:
      - name: "works"
        label: "Works"
        file: "data/works.json"
        format: "json"
        fields:
          - label: "Works"
            name: "works"
            widget: "list"
            summary: "{{fields.title}} — {{fields.category}} — {{fields.availability}}"
            fields:
              - { label: "ID / URL slug", name: "id", widget: "string", hint: "Lowercase, no spaces. Example: fragmented-motion-01" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Year", name: "year", widget: "string" }
              - { label: "Category", name: "category", widget: "select", options: ["Canvas", "Graffiti", "Murals", "VR Art"] }
              - { label: "Technique", name: "technique", widget: "string" }
              - { label: "Size", name: "size", widget: "string", required: false }
              - { label: "Availability", name: "availability", widget: "select", options: ["Available", "Sold", "Archive", "Commission archive", "Commission on request"] }
              - { label: "Price", name: "price", widget: "string", required: false, hint: "Use Price on request if the price should not be public." }
              - { label: "Featured on home", name: "featured", widget: "boolean", default: false }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Main image", name: "image", widget: "image" }
              - { label: "Alt text", name: "alt", widget: "string" }

      - name: "projects"
        label: "Projects"
        file: "data/projects.json"
        format: "json"
        fields:
          - label: "Projects"
            name: "projects"
            widget: "list"
            summary: "{{fields.title}} — {{fields.type}} — {{fields.location}}"
            fields:
              - { label: "ID / URL slug", name: "id", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Year", name: "year", widget: "string" }
              - { label: "Location", name: "location", widget: "string" }
              - { label: "Type", name: "type", widget: "string" }
              - { label: "Client", name: "client", widget: "string", required: false }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Main image", name: "mainImage", widget: "image" }
              - label: "Gallery"
                name: "gallery"
                widget: "list"
                required: false
                field: { label: "Image", name: "image", widget: "image" }
              - { label: "Alt text", name: "alt", widget: "string" }

      - name: "murals"
        label: "Murals"
        file: "data/murals.json"
        format: "json"
        fields:
          - label: "Murals"
            name: "murals"
            widget: "list"
            summary: "{{fields.title}} — {{fields.location}}"
            fields:
              - { label: "ID / URL slug", name: "id", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Location", name: "location", widget: "string" }
              - { label: "Year", name: "year", widget: "string" }
              - { label: "Technique", name: "technique", widget: "string" }
              - { label: "Client", name: "client", widget: "string", required: false }
              - { label: "Description", name: "description", widget: "text" }
              - { label: "Main image", name: "image", widget: "image" }
              - label: "Gallery"
                name: "gallery"
                widget: "list"
                required: false
                field: { label: "Image", name: "image", widget: "image" }
              - { label: "Alt text", name: "alt", widget: "string" }

      - name: "exhibitions"
        label: "Exhibitions & Collaborations"
        file: "data/exhibitions.json"
        format: "json"
        fields:
          - label: "Timeline entries"
            name: "exhibitions"
            widget: "list"
            summary: "{{fields.year}} — {{fields.title}}"
            fields:
              - { label: "Year", name: "year", widget: "string" }
              - { label: "Title", name: "title", widget: "string" }
              - { label: "Type", name: "type", widget: "string" }
              - { label: "Location", name: "location", widget: "string" }
              - { label: "Description", name: "description", widget: "text", required: false }

      - name: "collaborations"
        label: "Home Collaborations Strip"
        file: "data/collaborations.json"
        format: "json"
        fields:
          - label: "Collaborations"
            name: "collaborations"
            widget: "list"
            summary: "{{fields.name}}"
            fields:
              - { label: "Name", name: "name", widget: "string" }
              - { label: "Type", name: "type", widget: "string" }

      - name: "assets"
        label: "Image Catalogue"
        file: "data/assets.json"
        format: "json"
        fields:
          - label: "Asset folders"
            name: "assets"
            widget: "list"
            summary: "{{fields.category}}"
            fields:
              - { label: "Category", name: "category", widget: "string" }
              - { label: "Public path", name: "path", widget: "string" }
              - label: "Files"
                name: "files"
                widget: "list"
                required: false
                field: { label: "File name", name: "file", widget: "string" }
